<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólió</title>

    <link rel="stylesheet" href="style.css">
</head>
<div class="sajat-galeria">
    <h2>Saját iPad Rajzaim</h2>
    <div class="kepek-kontener">
        <img src="https://raw.githubusercontent.com/Lybra10020121/Galery/main/IMG_0257.jpeg" alt="Rajz 1">
        <img src="https://raw.githubusercontent.com/Lybra10020121/Galery/main/IMG_0259.jpeg" alt="Rajz 2">
        <img src="https://raw.githubusercontent.com/Lybra10020121/Galery/main/IMG_0260.jpeg" alt="Rajz 3">
        <img src="https://raw.githubusercontent.com/Lybra10020121/Galery/main/IMG_0261.jpeg" alt="Rajz 4">
    </div>
</div>

<style>
    /* Egy kis gyors formázás (ez az a bizonyos CSS/SSC rész) */
    .kepek-kontener {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        padding: 20px;
    }
    .kepek-kontener img {
        width: 300px; /* Itt állíthatod a képek méretét */
        height: auto;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        transition: transform 0.3s;
    }
    .kepek-kontener img:hover {
        transform: scale(1.05); /* Ha ráviszed az egeret, kicsit megnő */
    }
</style>

<body>

<header>
    <h1>Angelina Art</h1>
    <p>Abstract Art • Photography • Design</p>
</header>

<section class="about">
    <h2>Rólam</h2>
    <p>
        Festő és vizuális alkotó vagyok. Az oldalon absztrakt munkáimat és projektjeimet mutatom be.
    </p>
</section>

<section class="portfolio">
    <h2>Saját iPad rajzaim</h2>

    <div class="gallery">
        <img src="https://raw.githubusercontent.com/Lybra10020121/Galery/main/IMG_0257.jpeg">
        <img src="https://raw.githubusercontent.com/Lybra10020121/Galery/main/IMG_0259.jpeg">
        <img src="https://raw.githubusercontent.com/Lybra10020121/Galery/main/IMG_0260.jpeg">
        <img src="https://raw.githubusercontent.com/Lybra10020121/Galery/main/IMG_0261.jpeg">
    </div>
</section>

<footer>
    <p>© 2026 Angelina</p>
</footer>

</body>
</html>
